# DynastyCore Configuration

# Zodiac System
zodiac:
  # Prompt players to choose a zodiac on first join
  prompt-on-join: true

  # Allow players to change their zodiac (false = permanent choice)
  allow-change: false

  # Perk-specific tuning
  perks:
    rat-xp-bonus: 0.25
    tiger-bonus-damage: 2.0
    rabbit-dodge-chance: 0.10
    snake-potion-multiplier: 1.5
    horse-speed-amplifier: 1
    monkey-food-save-chance: 0.30
    dog-regen-radius: 8
    pig-ore-double-chance: 0.15

# Economy System
economy:
  # Chance for hostile mobs to drop copper coins on death (0.0 - 1.0)
  mob-drop-chance: 0.35

  # Min/max copper coins dropped per mob kill
  mob-drop-min: 1
  mob-drop-max: 3

  # Chance for villagers to accept copper coins in trades (0.0 - 1.0)
  villager-coin-trade-chance: 0.20

# Metrics
metrics:
  enabled: true
  port: 9230
